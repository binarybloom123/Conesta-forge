<!DOCTYPE html><html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body><h1>Spend Sense Dashboard</h1><input id="category" placeholder="Category"><input id="amount" type="number" placeholder="Amount"><button onclick="addExpense()">
Add Expense
</button><h2>Expense List</h2><ul id="expenseList"></ul><h2>Total Spending</h2><p id="total"></p><button onclick="logout()">
Logout
</button><script>

if(
localStorage.getItem("loggedIn")
!== "true"
){
window.location.href =
"login.html";
}

let expenses =
JSON.parse(
localStorage.getItem("expenses")
) || [];

function renderExpenses(){

const list =
document.getElementById(
"expenseList"
);

list.innerHTML = "";

let total = 0;

expenses.forEach(
(expense,index)=>{

total += expense.amount;

const li =
document.createElement("li");

li.innerHTML =
expense.category +
" - ₹" +
expense.amount +
" <button onclick='editExpense(" +
index +
")'>Edit</button>" +
" <button onclick='deleteExpense(" +
index +
")'>Delete</button>";

list.appendChild(li);

});

document.getElementById(
"total"
).innerText =
"₹" + total;

}

function addExpense(){

const category =
document.getElementById(
"category"
).value;

const amount =
Number(
document.getElementById(
"amount"
).value
);

if(!category || !amount){
alert("Fill all fields");
return;
}

expenses.push({
category,
amount
});

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

renderExpenses();

}

function editExpense(index){

const newAmount =
prompt(
"Enter new amount",
expenses[index].amount
);

if(newAmount){

expenses[index].amount =
Number(newAmount);

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

renderExpenses();

}

}

function deleteExpense(index){

expenses.splice(index,1);

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

renderExpenses();

}

function logout(){

localStorage.removeItem(
"loggedIn"
);

window.location.href =
"login.html";

}

renderExpenses();

</script></body>
</html>
